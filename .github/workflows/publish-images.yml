name: Publish Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - ".github/workflows/publish-images.yml"
      - "vpn/**"
      - "proxy/**"
      - "docker-compose.yml"
      - ".env.example"

env:
  REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
  VPN_IMAGE_NAME: hideme-vpn
  PROXY_IMAGE_NAME: hideme-proxy

jobs:
  changes:
    name: Detect Changed Images
    runs-on: ubuntu-latest
    outputs:
      vpn: ${{ steps.filter.outputs.vpn }}
      proxy: ${{ steps.filter.outputs.proxy }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect Image Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # 共享配置变更会同时影响两个镜像，因此两边都要重建。
          filters: |
            vpn:
              - 'vpn/**'
              - 'docker-compose.yml'
              - '.env.example'
              - '.github/workflows/publish-images.yml'
            proxy:
              - 'proxy/**'
              - 'docker-compose.yml'
              - '.env.example'
              - '.github/workflows/publish-images.yml'

  publish-vpn:
    name: Publish VPN Image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || needs.changes.outputs.vpn == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract VPN Metadata
        id: vpn-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.VPN_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build And Push VPN Image
        uses: docker/build-push-action@v6
        with:
          context: ./vpn
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.vpn-meta.outputs.tags }}
          labels: ${{ steps.vpn-meta.outputs.labels }}

  publish-proxy:
    name: Publish Proxy Image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || needs.changes.outputs.proxy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Proxy Metadata
        id: proxy-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.PROXY_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build And Push Proxy Image
        uses: docker/build-push-action@v6
        with:
          context: ./proxy
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.proxy-meta.outputs.tags }}
          labels: ${{ steps.proxy-meta.outputs.labels }}
